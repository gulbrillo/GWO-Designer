# Apache vhost for the GWO Designer app.  ${APP_ROOT} is substituted by entrypoint.sh
# (envsubst) at container start; it matches where the Dockerfile COPYed the app.

<VirtualHost *:80>
    DocumentRoot ${APP_ROOT}/htdocs

    # / serves the spacegravity.org landing page (app/root/index.html); the app
    # lives under /designer/ (linked from the landing page).

    # Static frontend (Polymer) + the app's own .htaccess (RewriteBase / rewrites
    # /designer/calculate.* -> /cgi-bin/*.pl).  AllowOverride All enables that file.
    <Directory ${APP_ROOT}/htdocs>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Perl CGI backend.
    ScriptAlias /cgi-bin/ ${APP_ROOT}/cgi-bin/
    <Directory ${APP_ROOT}/cgi-bin>
        Options +ExecCGI
        AddHandler cgi-script .pl
        Require all granted
    </Directory>

    # Pass the configured root to the CGI scripts ($ENV{APP_ROOT}).
    PassEnv APP_ROOT

    # Let pdflatex find the custom class/figures/bib:
    #   - designer-report.pl uses an absolute \documentclass path (works regardless)
    #   - report.full.pl uses a RELATIVE \documentclass{SelfArx}; SelfArx.cls lives in cgi-bin
    SetEnv TEXINPUTS ${APP_ROOT}/cgi-bin//:${APP_ROOT}/designer/latexelements//:

    ErrorLog  ${APACHE_LOG_DIR}/designer-error.log
    CustomLog ${APACHE_LOG_DIR}/designer-access.log combined
</VirtualHost>
