# Dev override (auto-loaded by `docker compose` when present).
# Live-mounts the STATIC frontend so HTML/CSS/JS edits show up without a rebuild.
#
# The Perl in app/cgi-bin is intentionally NOT bind-mounted: editing it live from
# Windows reintroduces the CRLF/exec-bit problems the image build fixes. Rebuild
# (`docker compose up --build`) after changing Perl. If you understand the caveats
# and want live Perl too, uncomment the second mount and run `dos2unix` + `chmod +x`
# on the host files first.

services:
  designer:
    volumes:
      - ../app/web:/app/htdocs/designer:ro
      # - ../app/cgi-bin:/app/cgi-bin:ro   # see caveat above
