# Run from the docker/ directory:  docker compose up --build
# Build context is the repo root (..), where the app/ tree lives.
#
# Default target is `base` (no LaTeX) so it builds on slow connections and you can
# test everything except the PDF report. To enable PDF reports, build the `full`
# target instead:  docker compose build --build-arg ... no — set target: full below
# (or:  TARGET=full docker compose up --build  with the override shown in the comment).

name: gwo-designer

services:
  designer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: base            # <-- change to `full` once you've downloaded texlive
    image: designer:${TARGET:-base}
    ports:
      # HOST_PORT defaults to 8080 (free locally). On the server set HOST_PORT=8081
      # (or any free port) so it doesn't clash with your existing :8080 container.
      # Bind to 127.0.0.1 on the server so only the local Apache reverse proxy reaches it.
      - "${HOST_PORT:-8080}:80"
    environment:
      APP_ROOT: /app
    volumes:
      - results:/app/htdocs/designer/results
      - sessions:/app/htdocs/designer/sessions
      - tmpl_sessions:/app/htdocs/designer/templates/sessions
      - identification:/app/designer/identification
    restart: unless-stopped

volumes:
  results:
  sessions:
  tmpl_sessions:
  identification:
