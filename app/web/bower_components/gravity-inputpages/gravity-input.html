<link rel="import" href="../../bower_components/polymer/polymer.html">  
<link href="../../bower_components/paper-input/paper-input.html" rel="import">
<link href="../../bower_components/gravity-tooltip/core-tooltip.html" rel="import">



<!--
The `gravite-input` element creates a input formfield with  hover tooltip that can be disabled.

Example:

<gravity-input floatingLabel label="Telescope diameter" value="22" validate="^[0-9]*$" error="Input must be a number!" position="right" hidetip>
<div unit>cm</div>
<div tip>This is just a tooltip.</div>
</gravity-input>

value: input field value (string)
position: left or right (or so)
hidetip: disable tooltip

-->



<polymer-element name="gravity-input" extends="paper-input" on-keypress="{{keypressHandler}}" attributes="name value hidetip position">

<template>
	<style>

        :host /deep/  .focusedColor
         {
              color: #00acc1;
	      background: #00acc1;
        }

:host /deep/ *:focus {
    outline: none;
}

:host {
  display: inline-block;
  outline: none;
  text-align: inherit;
  color: inherit;
}
:host(:hover) {
  cursor: default;
}


core-tooltip #paper-input {
  display: inline-block;
  outline: none;
  text-align: inherit;
  color: #757575;
}
core-tooltip #text:hover {
  cursor: text;
}

	core-tooltip #paper-input {
	width:230px;
	vertical-align: middle;
	}



core-tooltip  .text-pullup {
display:inline-block;
vertical-align: middle;
margin-bottom:12px;
}


core-tooltip .inner-tip {
width:260px;
white-space:normal;
}

@media all and (max-width: 710px) {


        core-tooltip.focus
        {
        position: fixed;
        background: #ffffff;
        top: 0;
        z-index: 6000;
        padding: 15px;
/*      width: 100%; */
        left: 0;
        right: 0;
        bottom:0;
        }

        core-tooltip.focus /deep/ #tooltip {
        visibility: visible !important;
        display: block !important;
z-index: 8000;
position: absolute;
left: 0;
right: 0;
margin: 0;
padding: 15px;
background-color: #505050;
border-radius: 0;
font-size: 15px;
bottom: 0;
top: 90px;
width:100%;
        }

        core-tooltip.focus .inner-tip {
        width: 100%;
        }

}


	</style>

                <core-tooltip id="wrapper" hidetip?="{{hidetip}}"  position="{{position}}" class="fancy pulldown">

<div id="text">
<div id="paper-input">
<shadow></shadow>
</div>

                        <div class="text-pullup">
<content select=[unit]></content>
			</div>
</div>

                          <div tip>
                                <div class="inner-tip">
<content select="[tip]"></content>
				</div>
                          </div>
                </core-tooltip>

</template>

  <script>
  Polymer('gravity-input', {
name: null,
value: null,
hidetip: false,
position: "right",

	keypressHandler: function(event, detail, sender) {
		if(event.which === 13) {
			this.$.input.blur();
			this.$.wrapper.classList.remove('focus');
		}		
	},

      focusAction: function(e) {
        if (!this.pressed) {
          if (this.floatingLabel) {
            this.$.floatedLabel.classList.remove('hidden');
            this.$.floatedLabel.classList.add('focused');
            this.$.floatedLabel.classList.add('focusedColor');
          }
          this.$.label.classList.add('hidden');
          this.$.underlineHighlight.classList.add('focused');
          this.$.caret.classList.add('focused');
          this.$.input.focus();
        }
        this.focused = true;
	this.$.wrapper.classList.add('focus');
      },

      blurAction: function() {
        this.$.underlineHighlight.classList.remove('focused');
        this.$.caret.classList.remove('focused');
        if (this.floatingLabel) {
          this.$.floatedLabel.classList.remove('focused');
          this.$.floatedLabel.classList.remove('focusedColor');
          if (!this.inputValue) {
            this.$.floatedLabel.classList.add('hidden');
          }
        }
        if (!this.inputValue) {
          this.$.label.classList.remove('hidden');
          this.$.label.classList.add('animating');
          this.async(function() {
            this.$.label.style.webkitTransform = 'none';
            this.$.label.style.transform = 'none';
          });
        }
        this.focused = false;
	this.$.wrapper.classList.remove('focus');
      }

});


  </script>


</polymer-element>
