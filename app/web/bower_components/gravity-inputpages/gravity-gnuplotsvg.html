<link rel="import" href="../../bower_components/polymer/polymer.html">
<link href="../../bower_components/paper-button/paper-button.html" rel="import">

<polymer-element name="gravity-gnuplotsvg" attributes="calculate data countsfor folder plot outofdate update uuid">
	<template>

<style>
object {width:100%;}
img {width:100%;}
.desc {background: #ffffff;max-width:100% !important; padding:0.5em 1.5em;min-width:280px !important; -ms-flex-basis:280px; -webkit-flex-basis:280px;flex-basis:280px;-ms-flex-grow:1; -webkit-flex-grow:1;flex-grow:1;}
.graph {background: #ffffff; -ms-flex-grow: 2; -webkit-flex-grow: 2;  flex-grow: 2; -ms-flex-basis:calc(640px + 3em); -webkit-flex-basis:calc(640px + 3em);flex-basis: calc(640px + 3em);min-width:0 !important; max-width:1000px;padding:0.5em 1.5em;}
.overlay {
position:absolute;
top:0;
bottom:0;
left:0;
right:0;
background: rgba(224,247,250,0.75);
border: 2px solid #00acc1;
cursor: pointer;
display:none;
font-size:24px;
}
.overlay[show] {
display:block;
}
.overlay .text {
position: absolute;
left: calc(50% - 115px);
top: calc(45% - 27px);
height:40px;
width:230px;
text-align: center;
}
.illegal {
border: none;
background: rgba(224,0,50,0.5);
color:#ffffff;
cursor:default;
top: 30%;
bottom: 40%;
}
.illegal .text {
left: calc(50% - 115px);
top: calc(50% - 27px);
}
    paper-button[raisedButton].colored {
      background: #00acc1;
      color: #fff;
    }
</style>

<div class="desc"><content></content></div>

<div class="graph expandlast">

<template repeat="{{d in data}}">

  <core-ajax auto method="POST" url="/designer/calculate.{{calculate}}"
      params='{ {{d.parameters}} }'
      handleAs="json" response="{{d.response}}" on-core-response="{{oneDown}}"></core-ajax>

<template repeat="{{r in d.response.result}}">

<div>
    <div style="white-space:pre-line;"><p>{{d.plottitle}}</p><!-- p><a target="_blank" href="/designer/{{folder}}/{{r.uuid}}/details.json">detailed results</a></p --></div>
    <div style="position:relative;"><object class="gnuplotSVG" onload="styleSVGs(this);" data="/designer/{{folder}}/{{r.uuid}}/{{plot}}" type="image/svg+xml"><img class="gnuplotSVG"  src="/designer/{{folder}}/{{r.uuid}}/{{plot}}"  type="image/svg+xml"></object><div class="overlay illegal" show?="{{r.illegal}}"><div class="text">INVALID INPUT PARAMETERS</div></div><div class="overlay update" show?="{{outofdate}}" onclick="{{update}}();"><div class="text"><paper-button raisedButton class="colored" label="Update"></paper-button></div></div></div>
</div>

</template>
</template>

</div>

</template>

  <script>
  Polymer('gravity-gnuplotsvg', {
calculate: "",
data: "",
countsfor: 0,
folder: "",
plot: "",
outofdate: false,
uuid: [],

   oneDown: function(e) {

console.log(e)
      this.uuid.push([e.detail.response.result[0].run, e.detail.response.result[0].uuid]);

      this.fire('gravity-gnuplotsvg-onedown',
          {count: this.countsfor});

	    }

});
</script>

</polymer-element>
