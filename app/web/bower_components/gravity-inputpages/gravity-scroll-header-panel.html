<link rel="import" href="../../bower_components/polymer/polymer.html">  
<link href="../../bower_components/core-scroll-header-panel/core-scroll-header-panel.html" rel="import">



<polymer-element name="gravity-scroll-header-panel" extends="core-scroll-header-panel" attributes="image" >

<template>



<shadow></shadow>
</template>

  <script>
  Polymer('gravity-scroll-header-panel', {

	image: '',

        ready: function() {
        this.async(this.updateImage);
        },

	updateImage: function() {
	this.$.headerBg.style.backgroundImage = this.image;
	},

        scrollToTop: function() {
        this.$.mainContainer.scrollTop = 0;
        }


});
  </script>


</polymer-element>
