<link rel="import" href="../../bower_components/polymer/polymer.html">  
<link href="../../bower_components/paper-radio-button/paper-radio-button.html" rel="import">
<link href="../../bower_components/gravity-tooltip/core-tooltip.html" rel="import">



<polymer-element name="gravity-radio" extends="paper-radio-button" attributes="hidetip position">

<template>

<style>
    core-tooltip.fancy::shadow .polymer-tooltip {
      opacity: 0;
      -webkit-transition: all 300ms cubic-bezier(0,1.92,.99,1.07);
      transition: all 300ms cubic-bezier(0,1.92,.99,1.07);
      -webkit-transform: translate3d(0, -10px, 0);
      transform: translate3d(0, -10px, 0);
    }

    core-tooltip.fancy:hover::shadow .polymer-tooltip,
    core-tooltip.fancy:focus::shadow .polymer-tooltip {
      opacity: 1;
      -webkit-transform: translate3d(0, 0, 0);
      transform: translate3d(0, 0, 0);
    }

core-tooltip /deep/ #tooltip.top {
left: -8px !important;
}

core-tooltip /deep/ .polymer-tooltip.top::after {
border-top-color: #607d8b;
left: 8px;
}

</style>

                <core-tooltip id="wrapper" hidetip?="{{hidetip}}"  position="{{position}}" class="fancy pulldown">

			<shadow></shadow>

                          <div tip>
                                <div class="inner-tip">
<content select="[tip]"></content>
                                </div>
                          </div>

                </core-tooltip>

</template>

  <script>
  Polymer('gravity-radio', {
name: null,
value: null,
hidetip: false,
position: "right"

});

  </script>


</polymer-element>
