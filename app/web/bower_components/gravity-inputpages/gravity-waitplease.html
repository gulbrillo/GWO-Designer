<link rel="import" href="../../bower_components/polymer/polymer.html">
<link href="../../bower_components/paper-shadow/paper-shadow.html" rel="import">

<polymer-element name="gravity-waitplease" attributes="current total">
	<template>

<style>
.waitplease {
width:96px;
height:96px;
display: inline-block;
position: relative;
border-radius: 48px;
background-color:white;
}

.waitplease-inner {
width:inherit;
height:inherit;
position: absolute;
left: 0;
right: 0;
border-radius: inherit;
}

.waitfont {
color: #00acc1;
font-size: 32px;
text-align: center;
height: 32px;
line-height: 32px;

}

@keyframes orbit {
  from {
    -webkit-transform: rotate(0deg);
  }
  to {
    -webkit-transform: rotate(360deg);
  }
}


@-webkit-keyframes orbit {
  from {
    -webkit-transform: rotate(0deg);
  }
  to {
    -webkit-transform: rotate(360deg);
  }
}

#orbit
{
width:inherit;
height:inherit;
position: absolute;

    -webkit-animation-name:             orbit;
    -webkit-animation-duration:         .8s;
    -webkit-animation-iteration-count:  infinite;
    -webkit-animation-timing-function: linear;

    animation-name:             orbit;
    animation-duration:         .8s;
    animation-iteration-count:  infinite;
    animation-timing-function: linear;

}

:host {  border-radius: 28px; display: inline-block;}


#moon
{
position:absolute;
width:16px;
height:16px;
border-radius: 8px;
background-color: #e00032;
    }

.centerme, .waitplease core-icon {
position:absolute;
left: 0;
right: 0;
margin-left: auto;
margin-right: auto;
top: 0;
bottom: 0;
margin-top: auto;
margin-bottom: auto;
}


</style>

	<div class="waitplease">
	<paper-shadow z="2"></paper-shadow>
        <div id="orbit" class="centerme"><div id="moon"></div></div>
        <div class="centerme waitfont">{{fortschritt}}%</div>
</div>

	</template>

  <script>
  Polymer('gravity-waitplease', {
current: 0,
total: 100,
fortschritt: 0,

//total is the number of combinations. each combination has one displacement, one single link and one whole detector plot. displacement is quick, whole detector is more like 4x slower, whole detector another 4x.
//total * (1 + 1*4 + 1*4*4) = total * 21 is 100%

   updateValue: function(e) {
	this.fortschritt = Math.round(this.current / (this.total * 21) * 100);
	
      this.fire('gravity-waitplease-update',
          {status: this.current});

	    }

});
</script>

</polymer-element>
